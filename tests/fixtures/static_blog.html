<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="A Sample Blog Post">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://example.com/blog/sample-post">
    <title>A Sample Blog Post</title>
</head>
<body>
    <header>
        <h1>Example Blog</h1>
    </header>
    <main>
        <article>
            <h1 class="entry-title">A Sample Blog Post</h1>
            <p class="byline">
                By <a href="/authors/jane-doe" rel="author">Jane Doe</a>
                on <time datetime="2025-01-15T10:30:00+00:00">January 15, 2025</time>
            </p>
            <div class="article-body">
                <p>This is the first paragraph of the sample blog post.</p>
                <p>This is the second paragraph with <a href="https://example.com">a link</a>.</p>
            </div>
            <footer>
                <span class="tags">#sample #blog</span>
            </footer>
        </article>
    </main>
</body>
</html>
