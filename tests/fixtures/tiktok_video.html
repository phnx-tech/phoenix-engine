<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Demo recipe on TikTok">
    <meta property="og:type" content="video">
    <title>Demo recipe • TikTok</title>
</head>
<body>
    <main class="tt-video-page">
        <article class="tt-video post" data-video-id="1234567890123456789">
            <div class="tt-video-container">
                <video
                    class="post-media"
                    src="https://cdn.example.com/tt/demo.mp4"
                    poster="https://cdn.example.com/tt/demo-thumb.jpg"
                    data-duration="45"
                ></video>
            </div>
            <aside class="tt-video-meta">
                <a class="tt-author-link" href="/@demochef">
                    <span class="tt-username author-name">demochef</span>
                </a>
                <h1 data-e2e="browse-video-desc">Quick dinner idea 🍝 #foodtok #easyrecipe</h1>
                <div class="tt-sound">
                    <h4 data-e2e="music-title">original sound - demochef</h4>
                </div>
                <section class="tt-stats">
                    <strong data-e2e="play-count">1.2M</strong>
                    <strong data-e2e="like-count">85.4K</strong>
                    <strong data-e2e="comment-count">1,204</strong>
                    <strong data-e2e="share-count">3.5K</strong>
                </section>
                <time class="timestamp" datetime="2025-01-18T14:30:00+00:00">2025-01-18</time>
            </aside>
        </article>
    </main>
</body>
</html>
